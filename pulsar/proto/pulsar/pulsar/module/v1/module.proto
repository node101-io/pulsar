syntax = "proto3";
package pulsar.pulsar.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "pulsar/x/pulsar/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "pulsar/x/pulsar"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
